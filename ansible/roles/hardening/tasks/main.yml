---
- name: Remove unnecessary packages
  shell: apt-get remove -y telnet rsh-client talk finger 2>/dev/null || true
  args:
    warn: false
  changed_when: false

- name: Disable unnecessary services
  systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - cups
    - avahi-daemon
  ignore_errors: true

- name: Harden SSH config
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
    - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
    - { regexp: '^#?AllowAgentForwarding', line: 'AllowAgentForwarding no' }
    - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
    - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 0' }
  notify: restart sshd

- name: Sysctl hardening
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: net.ipv4.tcp_syncookies, value: '1' }
    - { name: net.ipv4.conf.all.accept_redirects, value: '0' }
    - { name: net.ipv4.conf.all.rp_filter, value: '1' }
    - { name: net.ipv4.conf.all.log_martians, value: '1' }
    - { name: kernel.dmesg_restrict, value: '1' }
    - { name: fs.suid_dumpable, value: '0' }

- name: Install fail2ban and auditd
  shell: apt-get install -y fail2ban auditd
  args:
    creates: /usr/bin/fail2ban-client

- name: Configure fail2ban
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 3
      ignoreip = 127.0.0.1/8

      [sshd]
      enabled = true
      port = ssh
      logpath = %(sshd_log)s
      backend = systemd
  notify: restart fail2ban

- name: Start fail2ban
  systemd:
    name: fail2ban
    state: started
    enabled: true

- name: Configure auditd rules
  copy:
    dest: /etc/audit/rules.d/hardening.rules
    content: |
      -w /etc/passwd -p wa -k identity
      -w /etc/shadow -p wa -k identity
      -w /etc/sudoers -p wa -k identity
      -w /etc/ssh/sshd_config -p wa -k sshd
  notify: reload auditd

- name: Start auditd
  systemd:
    name: auditd
    state: started
    enabled: true

- name: Install unattended-upgrades
  shell: apt-get install -y unattended-upgrades
  args:
    creates: /usr/bin/unattended-upgrade

- name: Enable auto security updates
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Lock /tmp with noexec
  mount:
    path: /tmp
    src: tmpfs
    fstype: tmpfs
    opts: defaults,noexec,nosuid,nodev
    state: mounted
